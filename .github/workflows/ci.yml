# ============================================================
# CI pipeline for the portfolio site (GitHub Actions).
#
# Mental model: a workflow is a robot teammate. Every time you
# push code (or open a PR), it wakes up on a fresh Ubuntu VM,
# checks out your code, and runs the SAME commands you'd run
# locally: install deps → lint → test. If anything fails, the
# commit gets a red ❌ and you find out in minutes, not in prod.
# ============================================================
name: CI

# WHEN does the robot wake up?
on:
  push:            # every push to any branch
  pull_request:    # and every PR (so reviewers see green/red checks)

jobs:
  # ---------- Job 1: lint + test ----------
  lint-and-test:
    runs-on: ubuntu-latest   # GitHub gives us a throwaway Ubuntu VM

    steps:
      # Step 1: get the code onto the VM. Without this the VM is empty!
      - name: Check out repository
        uses: actions/checkout@v4

      # Step 2: install the Python version we develop with — pin it so
      # CI matches local dev and the Docker image (3.12 everywhere).
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Step 3: install runtime deps + the CI-only tools (linter, test runner).
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt flake8 pytest

      # Step 4: lint — catches typos, unused imports, style slips.
      # max-line-length 100 = PEP8's 79 is a bit strict for modern screens.
      - name: Lint with flake8
        run: flake8 . --max-line-length 100

      # Step 5: smoke tests (tests/test_smoke.py) — does the app answer HTTP?
      - name: Run smoke tests
        run: pytest -v

